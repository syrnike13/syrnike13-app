name: Promote Desktop Rollout

on:
  workflow_dispatch:
    inputs:
      version:
        description: Existing stable desktop version to promote.
        required: true
        type: string
      percentage:
        description: Next rollout percentage.
        required: true
        type: choice
        options:
          - '25'
          - '50'
          - '100'
      eligible_sessions:
        description: Eligible native sessions observed during the current stage.
        required: true
        type: number
      slo_approved:
        description: Confirm crash/start SLOs passed and no ABI, load, or signature blocker is open.
        required: true
        type: boolean

permissions:
  contents: read

jobs:
  promote:
    name: Promote stable desktop feed
    runs-on: ubuntu-latest
    environment: production
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '/opt/syrnike13' }}
      SYRNIKE_DOMAIN: ${{ vars.SYRNIKE_DOMAIN || 'syrnike13.ru' }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Validate requested release
        run: |
          set -euo pipefail
          [[ "${{ inputs.version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+([+-][0-9A-Za-z.-]+)?$ ]]
          test "${{ inputs.eligible_sessions }}" -ge 100
          test "${{ inputs.slo_approved }}" = 'true'
          test -n "$DEPLOY_HOST"
          test -n "$DEPLOY_USER"
          test -n "$DEPLOY_PATH"
      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          test -n "$SSH_PRIVATE_KEY"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts
      - name: Promote update manifests atomically
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" \
            "bash -s '$DEPLOY_PATH/data/desktop' '${{ inputs.version }}' '${{ inputs.percentage }}' '${{ inputs.eligible_sessions }}' '${{ inputs.slo_approved }}'" \
            < tooling/scripts/promote-desktop-rollout.sh
      - name: Verify public update feed
        run: |
          set -euo pipefail
          mapfile -t FEEDS < <(
            ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" \
              "find '$DEPLOY_PATH/data/desktop' -maxdepth 1 -type f -name 'latest*.yml' -printf '%f\\n'" |
              sort -u
          )
          test "${#FEEDS[@]}" -gt 0
          for FEED_NAME in "${FEEDS[@]}"; do
            FEED="$(curl --fail --silent --show-error "https://${SYRNIKE_DOMAIN}/downloads/desktop/${FEED_NAME}")"
            VERSION="$(printf '%s\n' "$FEED" | awk -F': *' '$1 == "version" { print $2; exit }')"
            PERCENTAGE="$(printf '%s\n' "$FEED" | awk -F': *' '$1 == "stagingPercentage" { print $2; exit }')"
            test "$VERSION" = "${{ inputs.version }}"
            test "$PERCENTAGE" = "${{ inputs.percentage }}"
          done
