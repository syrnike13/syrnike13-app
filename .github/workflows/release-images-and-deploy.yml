name: Production Release And Deploy

on:
  push:
    branches:
      - main
    paths:
      - VERSION
      - deploy/production/**
      - .github/workflows/release-images-and-deploy.yml
  workflow_dispatch:
    inputs:
      deploy:
        description: Deploy production after publishing images.
        required: false
        type: boolean
        default: true
      services:
        description: Space-separated compose services to deploy. Leave empty for all app services.
        required: false
        default: ""
      desktop:
        description: Build and publish the stable desktop release before deployment.
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

concurrency:
  group: release-syrnike13-production
  cancel-in-progress: false

jobs:
  version:
    name: Read release version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      sha_tag: ${{ steps.version.outputs.sha_tag }}
    steps:
      - uses: actions/checkout@v4
      - id: version
        run: |
          set -euo pipefail
          VERSION="$(tr -d '[:space:]' < VERSION)"
          test -n "$VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "sha_tag=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

  changes:
    name: Select images to publish
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.changes.outputs.web }}
      admin: ${{ steps.changes.outputs.admin }}
      backend: ${{ steps.changes.outputs.backend }}
      livekit: ${{ steps.changes.outputs.livekit }}
      desktop: ${{ steps.changes.outputs.desktop }}
      services: ${{ steps.changes.outputs.services }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - id: changes
        env:
          BEFORE_SHA: ${{ github.event.before }}
          REQUESTED_SERVICES: ${{ inputs.services || '' }}
          RELEASE_DESKTOP: ${{ inputs.desktop || false }}
        run: |
          set -euo pipefail

          backend_services="api events autumn january gifbox crond pushd voice-ingress"
          frontend_services="web admin"
          all_services="$frontend_services $backend_services livekit"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            desktop="$RELEASE_DESKTOP"
            if [ -n "$REQUESTED_SERVICES" ]; then
              services="$REQUESTED_SERVICES"
              web=false
              admin=false
              backend=false
              livekit=false

              if printf ' %s ' "$REQUESTED_SERVICES" | grep -q ' web '; then
                web=true
              fi

              if printf ' %s ' "$REQUESTED_SERVICES" | grep -q ' admin '; then
                admin=true
              fi

              for service in $backend_services; do
                case " $REQUESTED_SERVICES " in
                  *" $service "*) backend=true ;;
                esac
              done

              if printf ' %s ' "$REQUESTED_SERVICES" | grep -q ' livekit '; then
                livekit=true
              fi
            else
              services="$all_services"
              web=true
              admin=true
              backend=true
              livekit=true
            fi
            {
              echo "web=$web"
              echo "admin=$admin"
              echo "backend=$backend"
              echo "livekit=$livekit"
              echo "desktop=$desktop"
              echo "services=$services"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          publish_all=false
          changed_files=""

          if [ -n "$BEFORE_SHA" ] && [ "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ]; then
            if ! git cat-file -e "$BEFORE_SHA^{commit}" 2>/dev/null; then
              git fetch --no-tags --depth=1 origin "$BEFORE_SHA" || true
            fi

            if git cat-file -e "$BEFORE_SHA^{commit}" 2>/dev/null; then
              changed_files="$(git diff --name-only "$BEFORE_SHA" "$GITHUB_SHA")"
            else
              echo "::warning::Previous push commit $BEFORE_SHA is unavailable; publishing all images."
              publish_all=true
            fi
          elif git rev-parse --verify HEAD^ >/dev/null 2>&1; then
            changed_files="$(git diff --name-only HEAD^ HEAD)"
          else
            echo "::warning::No previous commit is available; publishing all images."
            publish_all=true
          fi

          if [ "$publish_all" = true ]; then
            {
              echo "web=true"
              echo "admin=true"
              echo "backend=true"
              echo "livekit=true"
              echo "desktop=true"
              echo "services=$all_services"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          backend=false
          livekit=false
          desktop=false
          services="$frontend_services"

          if printf '%s\n' "$changed_files" | grep -Eq '^deploy/production/compose\.yml$'; then
            services="$services database"
          fi

          if printf '%s\n' "$changed_files" | grep -Eq '^VERSION$'; then
            desktop=true
          fi

          if printf '%s\n' "$changed_files" | grep -Eq '^(services/backend/|deploy/production/|\.github/workflows/release-images-and-deploy\.yml)'; then
            backend=true
            services="$services $backend_services"
          fi

          if printf '%s\n' "$changed_files" | grep -Eq '^(services/livekit-server/|deploy/production/|\.github/workflows/release-images-and-deploy\.yml)'; then
            livekit=true
            services="$services livekit"
          fi

          {
            echo "web=true"
            echo "admin=true"
            echo "backend=$backend"
            echo "livekit=$livekit"
            echo "desktop=$desktop"
            echo "services=$services"
          } >> "$GITHUB_OUTPUT"

  web:
    name: Publish web image
    runs-on: ubuntu-latest
    needs:
      - version
      - changes
    if: ${{ needs.changes.outputs.web == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          platforms: linux/amd64
          build-args: |
            VITE_APP_TITLE=syrnike13
            VITE_RELEASE_CHANNEL=stable
            VITE_API_URL=https://syrnike13.ru/api
            VITE_WS_URL=wss://syrnike13.ru/ws
            VITE_MEDIA_URL=https://syrnike13.ru/autumn
            VITE_PROXY_URL=https://syrnike13.ru/january
            VITE_GIFBOX_URL=https://api.gifbox.me
            VITE_VOICE_NODE=worldwide
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web
          tags: |
            ghcr.io/${{ github.repository_owner }}/app-web:latest
            ghcr.io/${{ github.repository_owner }}/app-web:${{ needs.version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/app-web:${{ needs.version.outputs.sha_tag }}

  admin:
    name: Publish admin image
    runs-on: ubuntu-latest
    needs:
      - version
      - changes
    if: ${{ needs.changes.outputs.admin == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/admin/Dockerfile
          push: true
          platforms: linux/amd64
          build-args: |
            VITE_APP_TITLE=syrnike13 Admin
            VITE_RELEASE_CHANNEL=stable
            VITE_API_URL=https://syrnike13.ru/api
            VITE_MEDIA_URL=https://syrnike13.ru/autumn
            VITE_ADMIN_WEB_URL=https://admin.syrnike13.ru
          cache-from: type=gha,scope=admin
          cache-to: type=gha,mode=max,scope=admin
          tags: |
            ghcr.io/${{ github.repository_owner }}/app-admin:latest
            ghcr.io/${{ github.repository_owner }}/app-admin:${{ needs.version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/app-admin:${{ needs.version.outputs.sha_tag }}

  backend-base:
    name: Publish backend base image
    runs-on: ubuntu-latest
    needs:
      - version
      - changes
    if: ${{ needs.changes.outputs.backend == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Sync release version
        run: node tooling/scripts/sync-version.mjs
      - uses: docker/build-push-action@v6
        with:
          context: services/backend
          file: services/backend/Dockerfile
          push: true
          platforms: linux/amd64
          cache-from: type=gha,scope=backend-base
          cache-to: type=gha,mode=max,scope=backend-base
          tags: |
            ghcr.io/${{ github.repository_owner }}/app-base:latest
            ghcr.io/${{ github.repository_owner }}/app-base:${{ needs.version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/app-base:${{ needs.version.outputs.sha_tag }}

  backend-services:
    name: Publish backend service images
    runs-on: ubuntu-latest
    if: ${{ needs.changes.outputs.backend == 'true' }}
    needs:
      - changes
      - version
      - backend-base
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: api
            dockerfile: crates/delta/Dockerfile
          - image: events
            dockerfile: crates/bonfire/Dockerfile
          - image: file-server
            dockerfile: crates/services/autumn/Dockerfile
          - image: proxy
            dockerfile: crates/services/january/Dockerfile
          - image: gifbox
            dockerfile: crates/services/gifbox/Dockerfile
          - image: crond
            dockerfile: crates/daemons/crond/Dockerfile
          - image: pushd
            dockerfile: crates/daemons/pushd/Dockerfile
          - image: voice-ingress
            dockerfile: crates/daemons/voice-ingress/Dockerfile
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Sync release version
        run: node tooling/scripts/sync-version.mjs
      - uses: docker/build-push-action@v6
        with:
          context: services/backend
          file: services/backend/${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64
          build-args: |
            BASE_IMAGE=ghcr.io/${{ github.repository_owner }}/app-base:${{ needs.version.outputs.version }}
          cache-from: type=gha,scope=backend-${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=backend-${{ matrix.image }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/app-${{ matrix.image }}:latest
            ghcr.io/${{ github.repository_owner }}/app-${{ matrix.image }}:${{ needs.version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/app-${{ matrix.image }}:${{ needs.version.outputs.sha_tag }}

  livekit:
    name: Publish LiveKit image
    runs-on: ubuntu-latest
    needs:
      - version
      - changes
    if: ${{ needs.changes.outputs.livekit == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: services/livekit-server/go.mod
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: services/livekit-server
          file: services/livekit-server/Dockerfile
          push: true
          platforms: linux/amd64
          cache-from: type=gha,scope=livekit
          cache-to: type=gha,mode=max,scope=livekit
          tags: |
            ghcr.io/${{ github.repository_owner }}/app-livekit-server:latest
            ghcr.io/${{ github.repository_owner }}/app-livekit-server:${{ needs.version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/app-livekit-server:${{ needs.version.outputs.sha_tag }}

  native-windows:
    name: Verify Windows DLL runtime
    needs:
      - changes
      - version
    if: ${{ needs.changes.outputs.desktop == 'true' }}
    uses: ./.github/workflows/native-media-windows.yml
    with:
      release_channel: stable
      desktop_build_version: ${{ needs.version.outputs.version }}
      symbol_retention_days: 30

  desktop:
    name: Build desktop packages
    needs:
      - changes
      - version
      - native-windows
    if: ${{ needs.changes.outputs.desktop == 'true' && needs.native-windows.result == 'success' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            artifact: desktop-macos
          - os: windows-2022
            artifact: desktop-windows
          - os: ubuntu-24.04
            artifact: desktop-linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install Linux packaging deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-0 libnss3 libxss1 libasound2t64 fakeroot rpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm version:sync
      - name: Download verified Windows native runtime
        if: runner.os == 'Windows'
        uses: actions/download-artifact@v4
        with:
          name: native-runtime-windows-stable-${{ github.sha }}
          path: .
      - name: Verify downloaded Windows native runtime
        if: runner.os == 'Windows'
        run: pnpm desktop-native:verify
      - name: Build desktop
        if: runner.os != 'Windows'
        run: pnpm desktop:build
      - name: Build Windows desktop with verified native runtime
        if: runner.os == 'Windows'
        run: |
          pnpm --filter @syrnike13/web build
          pnpm --filter @syrnike13/desktop verify:web-dist
          pnpm --filter @syrnike13/platform build
          pnpm --filter @syrnike13/desktop exec tsup
      - name: Package Windows desktop
        if: runner.os == 'Windows'
        run: pnpm --filter @syrnike13/desktop package:prepared
      - name: Package desktop
        if: runner.os != 'Windows'
        run: pnpm --filter @syrnike13/desktop package:prepared
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            apps/desktop/release/latest*.yml
            apps/desktop/release/*.exe
            apps/desktop/release/*.exe.blockmap
            apps/desktop/release/*.zip
            apps/desktop/release/*.zip.blockmap
            apps/desktop/release/*.dmg
            apps/desktop/release/*.dmg.blockmap
            apps/desktop/release/*.AppImage
            apps/desktop/release/*.AppImage.blockmap
            apps/desktop/release/*.7z
            apps/desktop/release/*.7z.blockmap

  desktop-github-release:
    name: Publish desktop GitHub release
    runs-on: ubuntu-latest
    needs:
      - changes
      - version
      - desktop
    if: ${{ needs.changes.outputs.desktop == 'true' && needs.desktop.result == 'success' }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download Windows desktop artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: desktop-windows
          path: desktop-artifacts/desktop-windows
      - name: Download macOS desktop artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: desktop-macos
          path: desktop-artifacts/desktop-macos
      - name: Download Linux desktop artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: desktop-linux
          path: desktop-artifacts/desktop-linux
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.version }}
          name: syrnike13 v${{ needs.version.outputs.version }}
          # Installers plus latest*.yml and *.blockmap — required for electron-updater.
          files: |
            desktop-artifacts/**/latest*.yml
            desktop-artifacts/**/*.exe
            desktop-artifacts/**/*.exe.blockmap
            desktop-artifacts/**/*.zip
            desktop-artifacts/**/*.zip.blockmap
            desktop-artifacts/**/*.dmg
            desktop-artifacts/**/*.dmg.blockmap
            desktop-artifacts/**/*.AppImage
            desktop-artifacts/**/*.AppImage.blockmap
            desktop-artifacts/**/*.7z
            desktop-artifacts/**/*.7z.blockmap

  desktop-upload-production:
    name: Upload desktop artifacts to production
    runs-on: ubuntu-latest
    needs:
      - changes
      - desktop
    if: ${{ needs.changes.outputs.desktop == 'true' && needs.desktop.result == 'success' }}
    environment: production
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '/opt/syrnike13' }}
      SYRNIKE_DOMAIN: ${{ vars.SYRNIKE_DOMAIN || 'syrnike13.ru' }}
      DESKTOP_RELEASE_KEEP_VERSIONS: ${{ vars.DESKTOP_RELEASE_KEEP_VERSIONS || '5' }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Download Windows desktop artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: desktop-windows
          path: desktop-artifacts/desktop-windows
      - name: Download macOS desktop artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: desktop-macos
          path: desktop-artifacts/desktop-macos
      - name: Download Linux desktop artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: desktop-linux
          path: desktop-artifacts/desktop-linux
      - name: Validate configuration
        run: |
          set -euo pipefail
          test -n "$DEPLOY_HOST"
          test -n "$DEPLOY_USER"
          test -n "$DEPLOY_PATH"
      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          test -n "$SSH_PRIVATE_KEY"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts
      - name: Prune old production desktop artifacts
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p '$DEPLOY_PATH/data/desktop'"
          ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" \
            "bash -s '$DEPLOY_PATH/data/desktop' '$DESKTOP_RELEASE_KEEP_VERSIONS'" \
            < tooling/scripts/prune-desktop-artifacts.sh
      - name: Upload desktop update feed
        run: |
          set -euo pipefail
          STAGING="$(mktemp -d)"
          find desktop-artifacts -type f \( \
            -name '*.yml' -o -name '*.exe' -o -name '*.blockmap' -o \
            -name '*.zip' -o -name '*.dmg' -o -name '*.AppImage' -o -name '*.7z' \
          \) -exec cp {} "$STAGING/" \;
          if [ -z "$(ls -A "$STAGING")" ]; then
            echo "No desktop release artifacts found to upload."
            exit 1
          fi
          ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p '$DEPLOY_PATH/data/desktop'"
          rsync -av \
            --chmod=Du=rwx,Dgo=rx,Fu=rw,Fgo=r \
            -e "ssh -i ~/.ssh/deploy_key" \
            "$STAGING/" \
            "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/data/desktop/"
      - name: Update stable download aliases
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" \
            "bash -s '$DEPLOY_PATH/data/desktop'" \
            < tooling/scripts/update-download-aliases.sh
      - name: Prune uploaded desktop release history
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" \
            "bash -s '$DEPLOY_PATH/data/desktop' '$DESKTOP_RELEASE_KEEP_VERSIONS'" \
            < tooling/scripts/prune-desktop-artifacts.sh
      - name: Verify desktop update feed
        run: |
          set -euo pipefail
          VERSION="$(tr -d '[:space:]' < VERSION)"
          mapfile -t FEED_FILES < <(find desktop-artifacts -type f -name 'latest*.yml' -printf '%f\n' | sort -u)
          if [ "${#FEED_FILES[@]}" -eq 0 ]; then
            echo "No desktop update manifests found to verify."
            exit 1
          fi
          for FEED_FILE in "${FEED_FILES[@]}"; do
            FEED="$(curl --fail --silent --show-error "https://${SYRNIKE_DOMAIN}/downloads/desktop/${FEED_FILE}")"
            FEED_VERSION="$(printf '%s\n' "$FEED" | awk -F': *' '$1 == "version" { print $2; exit }')"
            if [ "$FEED_VERSION" != "$VERSION" ]; then
              echo "Desktop update feed ${FEED_FILE} version mismatch: expected $VERSION, got ${FEED_VERSION:-<missing>}"
              exit 1
            fi
            FEED_STAGE="$(printf '%s\n' "$FEED" | awk -F': *' '$1 == "stagingPercentage" { print $2; exit }')"
            if [ -n "$FEED_STAGE" ] && [ "$FEED_STAGE" != "100" ]; then
              echo "Desktop update feed ${FEED_FILE} must be available to all users; got stagingPercentage ${FEED_STAGE}"
              exit 1
            fi
          done
      - name: Verify stable download aliases
        run: |
          set -euo pipefail
          for ALIAS in syrnike13.dmg syrnike13-setup.exe syrnike13.AppImage; do
            curl --fail --silent --head "https://${SYRNIKE_DOMAIN}/downloads/${ALIAS}" >/dev/null
            echo "OK /downloads/${ALIAS}"
          done

  deploy:
    name: Deploy production
    runs-on: ubuntu-latest
    needs:
      - changes
      - version
      - web
      - admin
      - backend-services
      - livekit
      - desktop-github-release
      - desktop-upload-production
    environment: production
    permissions:
      contents: read
      packages: read
    if: ${{ always() && needs.changes.outputs.services != '' && needs.web.result != 'failure' && needs.web.result != 'cancelled' && needs.admin.result != 'failure' && needs.admin.result != 'cancelled' && needs.backend-services.result != 'failure' && needs.backend-services.result != 'cancelled' && needs.livekit.result != 'failure' && needs.livekit.result != 'cancelled' && (needs.changes.outputs.desktop != 'true' || (needs.desktop-github-release.result == 'success' && needs.desktop-upload-production.result == 'success')) && (github.event_name == 'push' || inputs.deploy == true) }}
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '/opt/syrnike13' }}
      SYRNIKE_DOMAIN: ${{ vars.SYRNIKE_DOMAIN || 'syrnike13.ru' }}
      SYRNIKE_ADMIN_DOMAIN: ${{ vars.SYRNIKE_ADMIN_DOMAIN || 'admin.syrnike13.ru' }}
      SYRNIKE_REVERSE_PROXY: ${{ vars.SYRNIKE_REVERSE_PROXY || 'false' }}
      SYRNIKE_VIDEO_ENABLED: ${{ vars.SYRNIKE_VIDEO_ENABLED || 'true' }}
      DEPLOY_GHCR_TOKEN: ${{ secrets.DEPLOY_GHCR_TOKEN || github.token }}
      APP_SERVICES: ${{ needs.changes.outputs.services }}
    steps:
      - uses: actions/checkout@v4
      - name: Validate configuration
        run: |
          set -euo pipefail
          test -n "$DEPLOY_HOST"
          test -n "$DEPLOY_USER"
          test -n "$DEPLOY_PATH"
          test -n "$SYRNIKE_DOMAIN"
          test -n "$SYRNIKE_ADMIN_DOMAIN"
      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          test -n "$SSH_PRIVATE_KEY"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts
      - name: Upload production files
        run: |
          set -euo pipefail
          tar -C deploy/production \
            --exclude='data*' \
            --exclude='.env' \
            --exclude='.env.web' \
            --exclude='secrets.env' \
            --exclude='secrets.env.old' \
            --exclude='Revolt.toml' \
            --exclude='Revolt.toml.old' \
            --exclude='livekit.yml' \
            --exclude='livekit.yml.old' \
            --exclude='compose.override.yml' \
            --exclude='compose.override.yml.old' \
            -czf /tmp/syrnike13-production.tar.gz .
          ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p '$DEPLOY_PATH'"
          scp -i ~/.ssh/deploy_key /tmp/syrnike13-production.tar.gz "$DEPLOY_USER@$DEPLOY_HOST:/tmp/syrnike13-production.tar.gz"
          ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" "tar -xzf /tmp/syrnike13-production.tar.gz -C '$DEPLOY_PATH' && rm /tmp/syrnike13-production.tar.gz && chmod +x '$DEPLOY_PATH/scripts/deploy-on-server.sh' '$DEPLOY_PATH/generate_config.sh'"
      - name: Select services
        id: services
        env:
          REQUESTED_SERVICES: ${{ inputs.services || '' }}
        run: |
          set -euo pipefail
          if [ -n "$REQUESTED_SERVICES" ]; then
            echo "services=$REQUESTED_SERVICES" >> "$GITHUB_OUTPUT"
          else
            echo "services=$APP_SERVICES" >> "$GITHUB_OUTPUT"
          fi
      - name: Run deploy
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" \
            "cd '$DEPLOY_PATH' && export SYRNIKE_DOMAIN='$SYRNIKE_DOMAIN' SYRNIKE_ADMIN_DOMAIN='$SYRNIKE_ADMIN_DOMAIN' SYRNIKE_REVERSE_PROXY='$SYRNIKE_REVERSE_PROXY' SYRNIKE_VIDEO_ENABLED='$SYRNIKE_VIDEO_ENABLED' GHCR_USERNAME='${{ github.actor }}' GHCR_TOKEN='$DEPLOY_GHCR_TOKEN' DEPLOY_SERVICES='${{ steps.services.outputs.services }}' && ./scripts/deploy-on-server.sh"
      - name: Verify API
        run: |
          set -euo pipefail
          curl --fail --silent --show-error "https://${SYRNIKE_DOMAIN}/api" >/dev/null
          curl --fail --silent --show-error --head "https://${SYRNIKE_ADMIN_DOMAIN}/" >/dev/null
