name: PR Ready Checks

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-ready-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile
      - name: Test frontend
        run: pnpm web:test
      - name: Build frontend
        run: pnpm web:build

  backend:
    name: Backend
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install backend system dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install Rust toolchain
        run: |
          test -f services/backend/rust-toolchain.toml
          rustup toolchain install 1.92.0 --profile minimal
          rustup default 1.92.0
          rustup show
      - name: Check backend
        run: pnpm backend:check
