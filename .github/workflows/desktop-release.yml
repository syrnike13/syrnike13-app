name: Desktop Release

on:
  push:
    branches:
      - main
    paths:
      - VERSION
  workflow_dispatch:

permissions:
  contents: write

jobs:
  native-windows:
    name: Verify Windows DLL runtime
    uses: ./.github/workflows/native-media-windows.yml
    with:
      release_channel: stable

  release:
    name: Build desktop packages
    needs: native-windows
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            artifact: desktop-macos
          - os: windows-2022
            artifact: desktop-windows
          - os: ubuntu-24.04
            artifact: desktop-linux
    runs-on: ${{ matrix.os }}
    env:
      SYRNIKE_DESKTOP_SENTRY_DSN: ${{ vars.DESKTOP_SENTRY_DSN }}
      SYRNIKE_DESKTOP_SENTRY_ENVIRONMENT: production
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Validate stable observability configuration
        if: runner.os == 'Windows'
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ vars.DESKTOP_SENTRY_PROJECT }}
        run: node -e "for (const key of ['SYRNIKE_DESKTOP_SENTRY_DSN','SENTRY_AUTH_TOKEN','SENTRY_ORG','SENTRY_PROJECT']) if (!process.env[key]) throw new Error('Missing stable observability setting ' + key)"
      - name: Install Linux packaging deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-0 libnss3 libxss1 libasound2t64 fakeroot rpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm version:sync
      - name: Build desktop and native runtime
        run: pnpm desktop:build
      - name: Upload Windows PDB and desktop source maps to Sentry
        if: runner.os == 'Windows'
        run: pnpm --filter @syrnike13/desktop upload:debug-artifacts
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ vars.DESKTOP_SENTRY_PROJECT }}
          SYRNIKE_REQUIRE_SENTRY_UPLOAD: '1'
      - name: Package and sign Windows desktop
        if: runner.os == 'Windows'
        run: pnpm --filter @syrnike13/desktop package:prepared
        env:
          SYRNIKE_REQUIRE_WINDOWS_SIGNING: '1'
          SYRNIKE_AZURE_SIGN_PUBLISHER: ${{ vars.AZURE_SIGN_PUBLISHER }}
          SYRNIKE_AZURE_SIGN_ENDPOINT: ${{ vars.AZURE_SIGN_ENDPOINT }}
          SYRNIKE_AZURE_SIGN_CERTIFICATE_PROFILE: ${{ vars.AZURE_SIGN_CERTIFICATE_PROFILE }}
          SYRNIKE_AZURE_SIGN_ACCOUNT: ${{ vars.AZURE_SIGN_ACCOUNT }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      - name: Package desktop
        if: runner.os != 'Windows'
        run: pnpm --filter @syrnike13/desktop package:prepared
      - name: Start desktop rollout at five percent
        run: node tooling/scripts/set-desktop-update-stage.mjs apps/desktop/release 5 --if-present
      - name: Verify Windows Authenticode signatures
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $signtool = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin\*\x64\signtool.exe" |
            Sort-Object FullName -Descending |
            Select-Object -First 1 -ExpandProperty FullName
          if (-not $signtool) { throw 'signtool.exe was not found' }
          $native = 'apps/desktop/release/win-unpacked/resources/native/win32-x64'
          $files = @(
            "$native/syrnike_media.node",
            "$native/syrnike_hooks.node",
            "$native/livekit.dll",
            "$native/livekit_ffi.dll",
            'apps/desktop/release/win-unpacked/syrnike13.exe'
          ) + @(Get-ChildItem apps/desktop/release -File -Filter '*.exe' | ForEach-Object FullName)
          foreach ($file in $files) {
            & $signtool verify /pa /all $file
            if ($LASTEXITCODE -ne 0) { throw "Invalid Authenticode signature: $file" }
          }
      - name: Retain release native symbols
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: desktop-windows-symbols-${{ github.sha }}
          retention-days: 30
          if-no-files-found: error
          path: |
            packages/desktop-native/build/**/*.pdb
            packages/desktop-native/dist/win32-x64/native-manifest.json
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            apps/desktop/release/latest*.yml
            apps/desktop/release/*.exe
            apps/desktop/release/*.exe.blockmap
            apps/desktop/release/*.zip
            apps/desktop/release/*.zip.blockmap
            apps/desktop/release/*.dmg
            apps/desktop/release/*.dmg.blockmap
            apps/desktop/release/*.AppImage
            apps/desktop/release/*.AppImage.blockmap
            apps/desktop/release/*.7z
            apps/desktop/release/*.7z.blockmap

  github-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: release
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          path: desktop-artifacts
      - id: version
        run: echo "version=$(tr -d '[:space:]' < VERSION)" >> "$GITHUB_OUTPUT"
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: syrnike13 v${{ steps.version.outputs.version }}
          # Installers plus latest*.yml and *.blockmap — required for electron-updater.
          files: |
            desktop-artifacts/**/latest*.yml
            desktop-artifacts/**/*.exe
            desktop-artifacts/**/*.exe.blockmap
            desktop-artifacts/**/*.zip
            desktop-artifacts/**/*.zip.blockmap
            desktop-artifacts/**/*.dmg
            desktop-artifacts/**/*.dmg.blockmap
            desktop-artifacts/**/*.AppImage
            desktop-artifacts/**/*.AppImage.blockmap
            desktop-artifacts/**/*.7z
            desktop-artifacts/**/*.7z.blockmap

  upload-production:
    name: Upload desktop artifacts to production
    runs-on: ubuntu-latest
    needs: release
    environment: production
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '/opt/syrnike13' }}
      SYRNIKE_DOMAIN: ${{ vars.SYRNIKE_DOMAIN || 'syrnike13.ru' }}
      DESKTOP_RELEASE_KEEP_VERSIONS: ${{ vars.DESKTOP_RELEASE_KEEP_VERSIONS || '5' }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          path: desktop-artifacts
      - name: Validate configuration
        run: |
          set -euo pipefail
          test -n "$DEPLOY_HOST"
          test -n "$DEPLOY_USER"
          test -n "$DEPLOY_PATH"
      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          test -n "$SSH_PRIVATE_KEY"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts
      - name: Prune old production desktop artifacts
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p '$DEPLOY_PATH/data/desktop'"
          ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" \
            "bash -s '$DEPLOY_PATH/data/desktop' '$DESKTOP_RELEASE_KEEP_VERSIONS'" \
            < tooling/scripts/prune-desktop-artifacts.sh
      - name: Upload desktop update feed
        run: |
          set -euo pipefail
          STAGING="$(mktemp -d)"
          find desktop-artifacts -type f \( \
            -name '*.yml' -o -name '*.exe' -o -name '*.blockmap' -o \
            -name '*.zip' -o -name '*.dmg' -o -name '*.AppImage' -o -name '*.7z' \
          \) -exec cp {} "$STAGING/" \;
          if [ -z "$(ls -A "$STAGING")" ]; then
            echo "No desktop release artifacts found to upload."
            exit 1
          fi
          ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p '$DEPLOY_PATH/data/desktop'"
          rsync -av \
            --chmod=Du=rwx,Dgo=rx,Fu=rw,Fgo=r \
            -e "ssh -i ~/.ssh/deploy_key" \
            "$STAGING/" \
            "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/data/desktop/"
      - name: Update stable download aliases
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" \
            "bash -s '$DEPLOY_PATH/data/desktop'" \
            < tooling/scripts/update-download-aliases.sh
      - name: Prune uploaded desktop release history
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" \
            "bash -s '$DEPLOY_PATH/data/desktop' '$DESKTOP_RELEASE_KEEP_VERSIONS'" \
            < tooling/scripts/prune-desktop-artifacts.sh
      - name: Verify desktop update feed
        run: |
          set -euo pipefail
          VERSION="$(tr -d '[:space:]' < VERSION)"
          mapfile -t FEED_FILES < <(find desktop-artifacts -type f -name 'latest*.yml' -printf '%f\n' | sort -u)
          if [ "${#FEED_FILES[@]}" -eq 0 ]; then
            echo "No desktop update manifests found to verify."
            exit 1
          fi
          for FEED_FILE in "${FEED_FILES[@]}"; do
            FEED="$(curl --fail --silent --show-error "https://${SYRNIKE_DOMAIN}/downloads/desktop/${FEED_FILE}")"
            FEED_VERSION="$(printf '%s\n' "$FEED" | awk -F': *' '$1 == "version" { print $2; exit }')"
            if [ "$FEED_VERSION" != "$VERSION" ]; then
              echo "Desktop update feed ${FEED_FILE} version mismatch: expected $VERSION, got ${FEED_VERSION:-<missing>}"
              exit 1
            fi
            FEED_STAGE="$(printf '%s\n' "$FEED" | awk -F': *' '$1 == "stagingPercentage" { print $2; exit }')"
            if [ "$FEED_STAGE" != "5" ]; then
              echo "Desktop update feed ${FEED_FILE} staging mismatch: expected 5, got ${FEED_STAGE:-<missing>}"
              exit 1
            fi
          done
      - name: Verify stable download aliases
        run: |
          set -euo pipefail
          for ALIAS in syrnike13.dmg syrnike13-setup.exe syrnike13.AppImage; do
            curl --fail --silent --head "https://${SYRNIKE_DOMAIN}/downloads/${ALIAS}" >/dev/null
            echo "OK /downloads/${ALIAS}"
          done
